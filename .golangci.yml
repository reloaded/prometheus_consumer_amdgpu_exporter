# golangci-lint v2 config.
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck    # gosimple was folded into staticcheck in v2
    - unused
  settings:
    gosec:
      excludes:
        # http.ResponseWriter writes intentionally don't check the error.
        - G104
        # subprocess via operator-controlled binary path (amd-smi).
        - G204
        # Reading the operator-supplied -config / sysfs paths.
        - G304
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

# In v2, gofmt and goimports are formatters (not linters).
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/reloaded/prometheus_consumer_amdgpu_exporter
